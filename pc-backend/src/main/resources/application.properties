# Configuración de base de datos
# En producción, define estas variables de entorno con los datos de Aiven PostgreSQL:
# DB_URL, DB_USERNAME, DB_PASSWORD y DB_DRIVER.
# En local, si no existen esas variables, Spring Boot usará MariaDB como base de desarrollo.
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/kimstore_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.mariadb.jdbc.Driver}

# Configuración de JPA / Hibernate
# En producción puedes usar DDL_AUTO=validate o DDL_AUTO=update según tu estrategia.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}

# Configuración de Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# CONFIGURACIÓN DE JWT
# ¡Esta clave secreta debe ser larguísima (mínimo 256 bits) para que sea segura!
jwt.secret=estaEsUnaClaveSecretaMuyLargaYComplejaParaProtegerMiAPIKimStore2026
jwt.expiration=86400000 
# (86,400,000 milisegundos = 24 horas de duración del token)

spring.application.name=pc-backend
